<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoastLab — Brutally Honest AI Startup Audits</title>
    <!-- Tailwind CSS for utility grids -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;700&display=swap">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --paper: #f7f5ec;
            --ink: #0c0806;
            --acid: #73d41d;
            --card: #fdfcf6;
            --muted-foreground: #534c44;
            --font-sans: 'JetBrains Mono', monospace;
            --font-serif: 'Fraunces', serif;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .serif-title {
            font-family: var(--font-serif);
        }

        /* Ticker tape visual layout */
        .ticker-wrapper {
            background-color: var(--ink);
            color: var(--paper);
            border-bottom: 2px solid var(--ink);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
        }

        .ticker-content {
            display: inline-block;
            animation: scroll-ticker 30s linear infinite;
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        /* Brutalist borders */
        .brutal-border {
            border: 2px solid var(--ink);
        }

        .brutal-shadow {
            box-shadow: 4px 4px 0px 0px var(--ink);
        }

        .brutal-shadow-lg {
            box-shadow: 8px 8px 0px 0px var(--ink);
        }

        .brutal-btn {
            background-color: var(--ink);
            color: var(--paper);
            border: 2px solid var(--ink);
            transition: all 0.15s cubic-bezier(0.16, 1, 0.32, 1);
        }

        .brutal-btn:hover {
            background-color: var(--acid);
            color: var(--ink);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px 0px var(--ink);
        }

        .brutal-btn:active {
            transform: translate(0px, 0px);
            box-shadow: 0px 0px 0px 0px var(--ink);
        }

        /* ASCII globe animation */
        .globe-ascii {
            font-size: 8px;
            line-height: 8px;
            letter-spacing: 1px;
            font-weight: bold;
            color: var(--ink);
            white-space: pre;
            opacity: 0.85;
            user-select: none;
        }

        /* Custom Scrollbar for Drawer */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: var(--ink);
        }

        /* Grid scanline overlays */
        .scanlines {
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.04) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative">
    <div class="scanlines absolute inset-0 z-50 pointer-events-none opacity-40"></div>

    <!-- Ticker Tape Top Banner -->
    <div class="ticker-wrapper">
        <div class="ticker-content">
            ✦ GLOBAL ROAST REACTOR ACTIVE ✦ MONITORED BREAKPOINTS: SILICON VALLEY [DELUSIONAL] ✦ TOKYO [CONSOLIDATING] ✦ LONDON [DIVERSIFYING] ✦ SHANGHAI [OVERHEATING] ✦ CURRENT TRANSACTION ID: #RL-2026-928A ✦ MEMORY OVERHEAD: 24.8% ✦ COMPILING AUTOMATED CRITIQUES ✦ GLOBAL ROAST REACTOR ACTIVE ✦
        </div>
    </div>
